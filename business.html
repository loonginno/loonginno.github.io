<head>

    <title>商务合作 · 全网招商</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html,body{width:100%;min-height:100vh;font-family:'Inter',"Microsoft YaHei",sans-serif;overflow-x:hidden;}
        :root{
            --bg-g:radial-gradient(circle at 20% 30%,rgba(248,245,255,.9),#f3f1f8);
            --text-1:#171c2a;--text-2:#5a6275;--main:#5b3cc4;
            --text-muted: #6c757d;
            --border-color:rgba(0,0,0,.05);
            --card:rgba(255,255,255,.7);
            --btn-secondary-bg: rgba(30, 41, 59, 0.06);
            --btn-secondary-border: rgba0,0,0,0.12);
            --btn-secondary-hover-bg: rgba(91, 60, 196, 0.12);
        }
        [data-theme="dark"]{
            --bg-g:radial-gradient(circle at 20% 30%,#1e1e2f,#121218);
            --text-1:#f0f0f5;--text-2:#b0b0c8;
            --text-muted: #8888a0;
            --border-color:rgba(255,255,255,.08);
            --card:rgba(40,40,60,.7);
            --btn-secondary-bg: rgba(200, 200, 220, 0.08);
            --btn-secondary-border: rgba(255,255,255,.15);
            --btn-secondary-hover-bg: rgba(91, 60, 196, 0.15);
        }
        body{background:var(--bg-g);color:var(--text-1);transition:.2s ease;padding:20px 20px;}
        .wrap{max-width:800px;margin:0 auto;}

        /* 返回按钮 原版精致+电脑手机布局正常 */
        .back-home{
            position: fixed;
            left: 28px;
            top: 24px;
            z-index: 99;
            padding: 10px 22px;
            border-radius: 80px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-1);
            background: var(--btn-secondary-bg);
            border: 1px solid var(--btn-secondary-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        .back-home:hover{
            background: var(--btn-secondary-hover-bg);
            color: #5b3cc4;
        }

        .page-title{font-size:36px;font-weight:700;text-align:center;margin-top:80px;margin-bottom:12px;background:linear-gradient(135deg,#2c3e66,#7c5cbf);-webkit-background-clip:text;color:transparent}
        .page-desc{text-align:center;color:var(--text-2);font-size:16px;margin-bottom:40px}

        .reg-box{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-bottom:45px}
        .btn-free{padding:16px 34px;border-radius:99px;text-decoration:none;font-size:16px;font-weight:600;color:#fff;background:linear-gradient(135deg,#2c96ff,#42b9ff);transition:.2s}
        .btn-pay{padding:16px 34px;border-radius:99px;text-decoration:none;font-size:16px;font-weight:600;color:#fff;background:linear-gradient(135deg,#5b3cc4,#7c5cbf);transition:.2s}

        .coop-list{display:flex;flex-direction:column;gap:20px}
        /* 重点：保留卡片 hover 上浮点击特效 完全不删！ */
        .coop-item{
            background:var(--card);
            border:1px solid var(--border-color);
            border-radius:24px;
            padding:26px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: all 0.25s ease;
        }
        .coop-item:hover{
            border-color:var(--main);
            transform: translateY(-3px); /* 抬升特效保留 */
        }
        .coop-item h3{font-size:20px;margin-bottom:10px}
        .coop-item p{color:var(--text-2);line-height:1.7;font-size:15px}

        .contact{
            margin-top:45px;text-align:center;padding:24px;background:var(--card);
            border-radius:24px;border:1px solid var(--border-color);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .contact strong{color:var(--main)}
        
        .footer {
            text-align: center;
            padding: 40px 20px 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 60px;
        }

        @media (max-width:720px){
            .page-title{font-size:28px;margin-top:90px;}
            .reg-box{flex-direction:column}
            .back-home{top:16px;left:16px;padding:9px 18px;}
            /* 手机仅微调模糊强度，质感还在、不卡顿，动画全部保留 */
            .back-home,.coop-item,.contact{
                backdrop-filter: blur(4px) !important;
                -webkit-backdrop-filter: blur(4px) !important;
            }
        }
    </style>
</head>
<body>

    <div class="footer">
        © 2026 龙创科技 · All Rights Reserved.
    </div>
</div>
<script>
let t=localStorage.getItem("theme");
if(t==="dark")document.documentElement.setAttribute("data-theme","dark");

</body>
</html>
