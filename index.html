<script>
    (function() {
        // 全局互斥锁 + 弹窗状态管理
        let isBusy = false;
        let modalActive = false; // 专门标记弹窗是否真正显示

        // 上锁 / 解锁
        function lock() { isBusy = true; }
        function unlock() { isBusy = false; }
        function withLock(callback) {
            if (isBusy) return false;
            lock();
            callback();
            setTimeout(unlock, 450);
            return true;
        }

        // ======================================
        // 欢迎弹窗
        // ======================================
        const welcomeModal = document.getElementById('welcomeModal');
        const closeWelcomeBtn = document.getElementById('closeWelcomeBtn');
        const customMsg = document.getElementById('customWelcomeMessage');

        if (customMsg) {
            customMsg.innerHTML = `龙创科技专注于高性价比通信服务。<br>点击「流量店铺」查看精选套餐，<br>或联系我获取专属方案。<br>1.2.3号及省内极速上门店铺下单后务必联系我报单，<br>全国产品店铺务必先支付费用再下单，请勿私自下单`;
        }

        setTimeout(() => {
            if (welcomeModal) {
                withLock(() => {
                    welcomeModal.classList.add('active');
                    modalActive = true; // 弹窗显示
                    document.body.style.overflow = 'hidden';
                });
            }
        }, 200);

        const closeWelcome = () => {
            withLock(() => {
                welcomeModal.classList.remove('active');
                modalActive = false; // 弹窗关闭
                document.body.style.overflow = '';
            });
        };

        closeWelcomeBtn.addEventListener('click', closeWelcome);
        welcomeModal.addEventListener('click', (e) => {
            if (e.target === welcomeModal) closeWelcome();
        });

        // ======================================
        // 店铺弹窗
        // ======================================
        const shopModal = document.getElementById('shopModal');
        const openShopBtn = document.getElementById('openShopBtn');
        const closeShopBtn = document.getElementById('closeShopBtn');

        const openShopModal = () => {
            withLock(() => {
                shopModal.classList.add('active');
                modalActive = true;
                document.body.style.overflow = 'hidden';
            });
        };

        const closeShopModal = () => {
            withLock(() => {
                shopModal.classList.remove('active');
                modalActive = false;
                document.body.style.overflow = '';
            });
        };

        openShopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            openShopModal();
        });

        closeShopBtn.addEventListener('click', closeShopModal);
        shopModal.addEventListener('click', (e) => {
            if (e.target === shopModal) closeShopModal();
        });

        // ======================================
        // 店铺链接（修复：只有弹窗显示时才能点击）
        // ======================================
        const realLinks = [
            'https://d.74tx.cn/nQYL',
            'https://172.lot-ml.com/ProductEn/Index/65bea861799e3bbe',
            'https://h5.gantanhao.com/?from=3%40C%40%40oGsFstqB%3BA%3FGs%3BBq%40%3F%3BF%40rG%3BqCrorA%40oE%3EoA3%40C%40%40',
            'https://bsx.pianwen.com.cn/s/W0SleL7w',
            'https://d.74tx.com/K3gV'
        ];

        const shopOptions = document.querySelectorAll('.shop-option');
        shopOptions.forEach((opt, idx) => {
            // 设置链接
            if (idx < realLinks.length && realLinks[idx]) {
                opt.href = realLinks[idx];
            }

            // ✅ 核心修复：弹窗没打开 → 直接禁止点击
            opt.addEventListener('click', (e) => {
                if (!modalActive || isBusy) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            });
        });

        // ======================================
        // 微信二维码弹窗
        // ======================================
        const wechatModal = document.getElementById('wechatModal');
        const openWechatBtn = document.getElementById('openWechatBtn');
        const closeWechatBtn = document.getElementById('closeWechatBtn');
        const wechatImg = document.getElementById('wechatQrImg');
        const yourWechatQr = "weixin.jpg";
        wechatImg.src = yourWechatQr;

        const openWechat = () => {
            withLock(() => {
                wechatModal.classList.add('active');
                modalActive = true;
                document.body.style.overflow = 'hidden';
            });
        };

        const closeWechat = () => {
            withLock(() => {
                wechatModal.classList.remove('active');
                modalActive = false;
                document.body.style.overflow = '';
            });
        };

        openWechatBtn.addEventListener('click', openWechat);
        closeWechatBtn.addEventListener('click', closeWechat);
        wechatModal.addEventListener('click', (e) => {
            if (e.target === wechatModal) closeWechat();
        });

        // ======================================
        // 返回顶部
        // ======================================
        const backTop = document.getElementById('backTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) backTop.classList.add('show');
            else backTop.classList.remove('show');
        });
        backTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();
</script>
